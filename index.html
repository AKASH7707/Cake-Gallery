<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01" aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse d-flex justify-content-between" id="navbarTogglerDemo01">
            <a class="navbar-brand" href="#">Cake Gallery</a>
            <div class="d-flex" role="search">
                <input id="searchInp" class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button id="searchBtn" class="btn btn-outline-success me-2" type="submit" onclick="onSearch()">Search</button>
                
            </div>
            </div>
        </div>
    </nav>
</header>
<!-- Favorite Section -->
<section id="FavoriteSection">
    <h1 class="text-center">Favorite Cakes</h1>
    <div class="row gap-5" id="favorite">

    </div>
</section>
<!-- Main Section -->
<section class="container">
    <h1 class="text-center">Cakes Collections</h1>
    <div class="row gap-5 d-flex justify-content-evenly" id="mainContainer">
        <!-- <div class="card" style="width: 18rem;">
            <img src="..." class="card-img-top" alt="...">
            <div class="card-body">
                <h5 class="card-title">Card title</h5>
                <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card’s content.</p>
                <a href="#" class="btn btn-primary">Go somewhere</a>
            </div>
        </div> -->
    </div>
</section>
</body>
<script>
    let globalCakes = null;
    const getData = async () => {
        try {
            let result = await fetch("https://www.themealdb.com/api/json/v1/1/filter.php?c=Dessert");
            let data = await result.json();
            let cakes = data.meals;
            globalCakes = cakes;

            favorite.innerHTML = "";
            mainContainer.innerHTML = "";
            FavoriteSection.style.display = "none";
            let parsedFav = JSON.parse(localStorage.getItem("favCakes")) || [];
            if(parsedFav.length>0){
                FavoriteSection.style.display = "inline";
            }

            parsedFav.forEach((eachCake) => {
                favorite.innerHTML += `
                <div class="container card col-4" style="width: 18rem;">
                    <img src="${eachCake.image}" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">${eachCake.title}</h5>
                        <button class="btn btn-danger" onclick="removeFav('${eachCake.id}')">Remove</button>
                    </div>
                </div>`;
            });

            cakes.forEach((eachCake) => {
                mainContainer.innerHTML += `
                <div class="card col-4" style="width: 18rem;">
                    <img src="${eachCake.strMealThumb}" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">${eachCake.strMeal}</h5>
                        <button class="btn btn-primary"
                            onclick="addFav('${eachCake.idMeal}','${eachCake.strMeal}','${eachCake.strMealThumb}')">
                            Add to Favorites
                        </button>
                    </div>
                </div>`;
            });

        } catch (error) {
            console.log(error);
        }
    };

    getData();

    const addFav = (id, title, image) => {
        let parsedFav = JSON.parse(localStorage.getItem("favCakes")) || [];

        let exists = parsedFav.some((cake) => cake.id === id);
        if (!exists) {
            parsedFav.push({ id, title, image });
            localStorage.setItem("favCakes", JSON.stringify(parsedFav));
        }

        getData();
    };

    const removeFav = (id) => {
        let parsedFav = JSON.parse(localStorage.getItem("favCakes")) || [];

        let updatedFav = parsedFav.filter((cake) => cake.id !== id);

        localStorage.setItem("favCakes", JSON.stringify(updatedFav));
        getData();
    };




</script>
</html>
